<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant blue to purple gradient for the left pillar -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12b3ff" />
      <stop offset="100%" stop-color="#7f40ff" />
    </linearGradient>
  </defs>

  <!-- Dark circular background -->
  <circle cx="256" cy="256" r="256" fill="#040404" />

  <!-- Left Pillar (Gradient) -->
  <path d="M 130 400 
           L 130 160 
           L 200 90 
           L 200 210 
           L 280 210 
           L 200 290 
           L 200 330 
           Z" 
        fill="url(#brandGrad)" 
        stroke="url(#brandGrad)" 
        stroke-width="8" 
        stroke-linejoin="round" />

  <!-- Right Pillar (White) -->
  <path d="M 382 112 
           L 382 352 
           L 312 422 
           L 312 302 
           L 232 302 
           L 312 222 
           L 312 182 
           Z" 
        fill="#ffffff" 
        stroke="#ffffff" 
        stroke-width="8" 
        stroke-linejoin="round" />
</svg>
